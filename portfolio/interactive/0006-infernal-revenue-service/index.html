<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infernal Revenue Service — Afterlife Tax Preparation</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #1c1410;
    --bg-form: #f5edd8;
    --bg-form-alt: #ece3cc;
    --text-dark: #2a1f14;
    --text-muted: #7a6b58;
    --text-light: #e8dcc8;
    --accent: #c41e3a;
    --accent-glow: rgba(196, 30, 58, 0.3);
    --seal-gold: #b8943e;
    --seal-gold-light: #d4aa4f;
    --border: #d4c9b0;
    --input-bg: #fffdf7;
    --success: #2d7a3a;
    --warning: #b8741e;
    --danger: #a83232;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    background: var(--bg);
    color: var(--text-light);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(196,30,58,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(184,148,62,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(100,60,30,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .game-container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ---- TITLE ---- */

  #screen-title {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }

  .title-seal {
    width: 120px; height: 120px;
    border: 3px solid var(--seal-gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
    position: relative;
    animation: sealPulse 4s ease-in-out infinite;
  }

  .title-seal::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid var(--seal-gold);
    border-radius: 50%;
  }

  .title-seal i { font-size: 42px; color: var(--seal-gold); }

  @keyframes sealPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(184,148,62,0.2); }
    50% { box-shadow: 0 0 40px rgba(184,148,62,0.4); }
  }

  .title-name {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--seal-gold-light);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .title-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 48px;
  }

  .title-tagline {
    font-size: 20px;
    font-style: italic;
    color: var(--text-light);
    max-width: 500px;
    line-height: 1.6;
    margin-bottom: 48px;
    opacity: 0.8;
  }

  .title-notice {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    max-width: 400px;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  /* ---- BUTTONS ---- */

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px 36px;
    border: 2px solid var(--seal-gold);
    background: transparent;
    color: var(--seal-gold-light);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn:hover {
    background: var(--seal-gold);
    color: var(--bg);
    box-shadow: 0 0 30px rgba(184,148,62,0.3);
  }

  .btn:focus-visible {
    outline: 2px solid var(--seal-gold-light);
    outline-offset: 3px;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background: #d42448;
    box-shadow: 0 0 30px var(--accent-glow);
  }

  .btn-small {
    font-size: 11px;
    padding: 10px 24px;
  }

  /* ---- FORM CARD ---- */

  .form-card {
    background: var(--bg-form);
    color: var(--text-dark);
    border-radius: 2px;
    padding: 40px;
    margin-bottom: 24px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    position: relative;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--seal-gold), var(--accent));
  }

  .form-header {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .form-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 8px;
  }

  .form-subtitle {
    font-size: 16px;
    color: var(--text-muted);
    margin-bottom: 24px;
    font-style: italic;
  }

  .form-group { margin-bottom: 20px; }

  .form-label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .form-input {
    width: 100%;
    padding: 10px 14px;
    font-family: 'Crimson Text', serif;
    font-size: 18px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text-dark);
    border-radius: 1px;
    transition: border-color 0.2s;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(196,30,58,0.1);
  }

  .form-input::placeholder {
    color: #bbb;
    font-style: italic;
  }

  .form-row {
    display: flex;
    gap: 20px;
  }

  .form-row .form-group { flex: 1; }

  /* ---- AUDITOR PANEL ---- */

  .auditor-panel {
    background: linear-gradient(135deg, #1e1612 0%, #251c16 100%);
    border: 1px solid rgba(184,148,62,0.2);
    border-radius: 2px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .auditor-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--seal-gold-light);
    margin-bottom: 4px;
  }

  .auditor-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  /* ---- MEMORY FRAME ---- */

  .memory-frame {
    border: 2px solid var(--border);
    padding: 32px;
    margin-bottom: 24px;
    background: var(--bg-form-alt);
    position: relative;
  }

  .memory-frame::after {
    content: 'MEMORY RECONSTRUCTION';
    position: absolute;
    top: -10px; left: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--bg-form-alt);
    padding: 0 8px;
    color: var(--text-muted);
  }

  .memory-text {
    font-size: 18px;
    line-height: 1.8;
    color: var(--text-dark);
    margin-bottom: 24px;
  }

  .reframe-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .reframe-option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 16px 20px;
    margin-bottom: 10px;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-left: 4px solid var(--border);
    font-family: 'Crimson Text', serif;
    font-size: 16px;
    color: var(--text-dark);
    cursor: pointer;
    transition: all 0.25s ease;
    line-height: 1.5;
  }

  .reframe-option:hover {
    border-left-color: var(--seal-gold);
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .reframe-option:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  .reframe-option:active { transform: scale(0.99); }

  /* ---- SCORE PANEL ---- */

  .score-panel {
    position: sticky;
    top: 20px;
    background: linear-gradient(135deg, #1e1612 0%, #2a1f18 100%);
    border: 1px solid rgba(184,148,62,0.25);
    border-radius: 2px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .score-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 14px;
  }

  .score-row + .score-row { border-top: 1px solid rgba(255,255,255,0.05); }

  .score-label {
    color: var(--text-muted);
    font-size: 13px;
  }

  .score-value {
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--seal-gold-light);
    font-size: 14px;
  }

  .score-value.positive { color: var(--success); }
  .score-value.negative { color: var(--danger); }
  .score-value.warning { color: var(--warning); }

  .score-bar {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 6px;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.8s ease;
  }

  .score-bar-fill.deduction {
    background: linear-gradient(90deg, var(--success), var(--seal-gold));
  }

  .score-bar-fill.risk {
    background: linear-gradient(90deg, var(--success), var(--warning), var(--danger));
  }

  /* ---- RESPONSE OVERLAY ---- */

  .response-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    overflow-y: auto;
    padding: 40px 20px;
  }

  .response-overlay.active {
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .response-card {
    background: var(--bg-form);
    color: var(--text-dark);
    max-width: 620px;
    width: 100%;
    padding: 40px;
    border-radius: 2px;
    position: relative;
    margin-top: 40px;
  }

  .response-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--seal-gold);
  }

  .response-auditor-name {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .response-quote {
    font-size: 18px;
    line-height: 1.7;
    font-style: italic;
    color: var(--text-dark);
    padding-left: 20px;
    border-left: 3px solid var(--seal-gold);
    margin-bottom: 24px;
  }

  .response-stats {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
    padding: 16px;
    background: var(--bg-form-alt);
    border-radius: 2px;
  }

  .response-stat {
    text-align: center;
    flex: 1;
  }

  .response-stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
  }

  .response-stat-value.approved { color: var(--success); }
  .response-stat-value.flagged { color: var(--danger); }

  .response-stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .response-detail {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.8;
    margin-bottom: 12px;
  }

  .response-detail span.approved { color: var(--success); font-weight: 500; }
  .response-detail span.flagged { color: var(--danger); font-weight: 500; }
  .response-detail span.neutral { color: var(--text-muted); }

  .response-clue-box {
    background: rgba(184,148,62,0.08);
    border: 1px dashed rgba(184,148,62,0.3);
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 13px;
    font-style: italic;
    color: #8a7a5a;
    line-height: 1.5;
  }

  .response-clue-box strong {
    font-style: normal;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ---- REVIEW TABLE ---- */

  .review-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin-bottom: 24px;
  }

  .review-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-align: left;
    padding: 10px 12px;
    border-bottom: 2px solid var(--border);
  }

  .review-table td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .flag-indicator {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  .flag-indicator.clean { background: var(--success); }
  .flag-indicator.flagged {
    background: var(--danger);
    animation: flagPulse 2s infinite;
  }

  @keyframes flagPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ---- BRACKET DISPLAY ---- */

  .bracket-display {
    text-align: center;
    padding: 40px;
    border: 2px solid var(--seal-gold);
    margin: 24px 0;
    position: relative;
  }

  .bracket-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .bracket-value {
    font-size: 36px;
    font-weight: 700;
    color: var(--seal-gold-light);
    margin-bottom: 4px;
  }

  .bracket-description {
    font-size: 16px;
    color: var(--text-light);
    font-style: italic;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .assessment-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin: 24px 0;
  }

  .assessment-item {
    padding: 20px;
    border: 1px solid rgba(184,148,62,0.2);
    border-radius: 2px;
  }

  .assessment-item-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .assessment-item-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--seal-gold-light);
  }

  /* ---- PROGRESS ---- */

  .progress-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .progress-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: all 0.3s;
  }

  .progress-dot.completed { background: var(--success); }
  .progress-dot.current {
    background: var(--seal-gold);
    box-shadow: 0 0 8px rgba(184,148,62,0.4);
  }

  /* ---- UTILITY ---- */

  .fade-in { animation: fadeIn 0.6s ease forwards; }
  .fade-in-slow { animation: fadeIn 1.2s ease forwards; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .warning-box {
    background: rgba(168,50,50,0.12);
    border: 1px solid rgba(168,50,50,0.3);
    border-left: 4px solid var(--danger);
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 14px;
    color: #d4a0a0;
  }

  .info-box {
    background: rgba(184,148,62,0.08);
    border: 1px solid rgba(184,148,62,0.2);
    border-left: 4px solid var(--seal-gold);
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 14px;
    color: var(--text-muted);
  }

  .help-toggle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    margin-bottom: 16px;
    transition: color 0.2s;
  }

  .help-toggle:hover { color: var(--text-light); }

  .help-content {
    display: none;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-muted);
    padding: 14px;
    border: 1px dashed rgba(184,148,62,0.2);
    margin-bottom: 20px;
  }

  .help-content.visible { display: block; }

  .seal-circle {
    width: 80px; height: 80px;
    border: 2px solid var(--seal-gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    position: relative;
  }

  .seal-circle::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid var(--seal-gold);
    border-radius: 50%;
  }

  .seal-circle i { font-size: 28px; color: var(--seal-gold); }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 24px;
    align-items: start;
  }

  .summary-stat-box {
    flex: 1;
    min-width: 140px;
    padding: 16px;
    background: var(--bg-form-alt);
    border-radius: 2px;
  }

  .summary-stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .summary-stat-value {
    font-size: 24px;
    font-weight: 700;
  }

  @media (max-width: 768px) {
    .two-col { grid-template-columns: 1fr; }
    .score-panel { position: static; order: -1; }
    .form-card { padding: 24px; }
    .title-name { font-size: 28px; letter-spacing: 1px; }
    .response-stats { flex-direction: column; gap: 12px; }
    .assessment-grid { grid-template-columns: 1fr; }
    .form-row { flex-direction: column; gap: 0; }
  }

  .hidden { display: none !important; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<canvas id="bg-canvas" aria-hidden="true"></canvas>
<div class="game-container" id="game-container"></div>
<div class="response-overlay" id="response-overlay" role="dialog" aria-modal="true"></div>

<script>
/* ===================================================
   BACKGROUND EMBERS
   =================================================== */
(function() {
  var canvas = document.getElementById('bg-canvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  for (var i = 0; i < 40; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 2 + 0.5,
      dx: (Math.random() - 0.5) * 0.3,
      dy: -Math.random() * 0.4 - 0.1,
      alpha: Math.random() * 0.5 + 0.1,
      pulse: Math.random() * Math.PI * 2
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.dx;
      p.y += p.dy;
      p.pulse += 0.02;
      var a = p.alpha * (0.5 + 0.5 * Math.sin(p.pulse));
      if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.1, p.r), 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(184,148,62,' + a.toFixed(3) + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  var mq = window.matchMedia('(prefers-reduced-motion: reduce)');
  if (!mq.matches) draw();
})();

/* ===================================================
   GAME DATA
   =================================================== */

var AUDITORS = [
  {
    name: "Seriphina",

/* ===================================================

   =================================================== */

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function getResponseKey(auditor) {
  var map = {
    compassion: 'responseCompassion',
    justice: 'responseJustice',
    generosity: 'responseGenerosity'
  };
  return map[auditor.valuedVirtue];
}

function calculateMaxDeductions() {
  var max = 0;
  var respKey = getResponseKey(state.auditor);
  for (var i = 0; i < MEMORIES.length; i++) {
    var memBest = 0;
    for (var j = 0; j < MEMORIES[i].options.length; j++) {
      var opt = MEMORIES[i].options[j];
      var resp = opt[respKey];
      if (resp && resp.approved) {
        memBest = Math.max(memBest, opt.value);
      }
    }
    max += memBest;
  }
  state.maxDeductions = Math.max(1, max);
}

function getBracketIndex(score) {
  if (score >= 85) return 4;
  if (score >= 65) return 3;
  if (score >= 40) return 2;
  if (score >= 20) return 1;
  return 0;
}

function escapeHTML(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

/* ===================================================
   GAME LOGIC
   =================================================== */

function submitIntake() {
  var nameEl = document.getElementById('input-name');
  var dobEl = document.getElementById('input-dob');
  var dodEl = document.getElementById('input-dod');

  if (!nameEl.value.trim()) {
    nameEl.style.borderColor = 'var(--danger)';
    nameEl.focus();
    return;
  }

  state.playerName = nameEl.value.trim();
  state.playerDOB = dobEl.value.trim() || 'Unknown';
  state.playerDOD = dodEl.value.trim() || 'Recent';

  /* Assign auditor */
  state.auditor = pickRandom(AUDITORS);
  calculateMaxDeductions();

  state.screen = 'auditor';
  render();
}

function chooseReframe(optionIndex) {
  var mem = MEMORIES[state.currentMemory];
  var option = mem.options[optionIndex];
  var a = state.auditor;

  /* Retrieve auditor-specific response */
  var respKey = getResponseKey(a);
  var response = option[respKey];
  if (!response) return;

  var approved = response.approved;
  var value = approved ? option.value : Math.floor(option.value * 0.4);
  var flagged = !approved;

  /* Record deduction */
  state.deductions.push({
    memoryId: mem.id,
    optionIndex: optionIndex,
    chosenText: option.text,
    virtue: option.virtue,
    framing: option.framing,
    value: value,
    approved: approved,
    flagged: flagged
  });

  if (approved) {
    state.totalDeductions += option.value;
    state.approvedCount++;
  } else {
    state.totalDeductions += Math.floor(option.value * 0.4);
    state.auditFlags++;
    state.flaggedCount++;
  }

  /* Extract a clue about this auditor's preferences */
  var clue = extractClue(a, option, approved);
  if (clue) state.cluesFound.push(clue);

  /* Show the response overlay */
  showResponse(response, approved, value, option);
}

function extractClue(a, option, approved) {
  var reveals = a.biasReveals[approved ? 'approved' : 'rejected'];
  var baseClue = pickRandom(reveals);

  /* After enough data, give increasingly precise hints */
  if (state.cluesFound.length >= 2) {
    var virtueMap = {
      compassion: 'emotional connection and tenderness',
      justice: 'fairness, reciprocity, and balanced ledgers',
      generosity: 'unconditional giving and open-handedness'
    };
    var framingMap = {
      duty: '"duty" and obligation-based framings',
      sacrifice: 'self-sacrifice and suffering-based framings',
      justice: 'justice-first and correctness-based framings'
    };

    if (approved && a.valuedVirtue === option.virtue) {
      return 'Responds strongly to ' + virtueMap[a.valuedVirtue] + ' — this seems to be a core value.';
    }
    if (!approved && a.dislikedFraming === option.framing) {
      return 'Clearly distrusts ' + framingMap[a.dislikedFraming] + '. Avoid this angle.';
    }
  }

  return baseClue;
}

function showResponse(response, approved, value, option) {
  var a = state.auditor;
  var statusColor = approved ? 'var(--success)' : 'var(--danger)';
  var statusText = approved ? 'Approved' : 'Flagged';
  var statusClass = approved ? 'approved' : 'flagged';
  var valueDisplay = approved ? '+' + value : '+' + value + ' (reduced)';
  var isLast = state.currentMemory >= MEMORIES.length - 1;
  var nextLabel = isLast ? 'Continue to Review' : 'Next Memory';

  var latestClue = state.cluesFound.length > 0
    ? state.cluesFound[state.cluesFound.length - 1]
    : null;

  var clueBox = latestClue
    ? '<div class="response-clue-box">' +
        '<strong>Auditor Insight</strong><br>' +
        latestClue +
      '</div>'
    : '';

  overlay.innerHTML =
    '<div class="response-card fade-in">' +
      '<div class="response-auditor-name">' +
        '<i class="fas fa-user-tie" style="margin-right: 6px;"></i>' +
        a.name + ' — ' + a.title +
      '</div>' +
      '<div class="response-quote" style="border-color: ' + statusColor + ';">' +
        '"' + response.quote + '"' +
      '</div>' +
      '<div class="response-stats">' +
        '<div class="response-stat">' +
          '<div class="response-stat-value ' + statusClass + '">' + statusText + '</div>' +
          '<div class="response-stat-label">Determination</div>' +
        '</div>' +
        '<div class="response-stat">' +
          '<div class="response-stat-value ' + statusClass + '">' + valueDisplay + '</div>' +
          '<div class="response-stat-label">Deduction Value</div>' +
        '</div>' +
      '</div>' +
      '<div class="response-detail">' +
        'Filing virtue: <span class="neutral">' + option.virtue + '</span> &nbsp;|&nbsp; ' +
        'Framing: <span class="neutral">' + option.framing + '</span> &nbsp;|&nbsp; ' +
        'Status: <span class="' + statusClass + '">' + statusText.toLowerCase() + '</span>' +
        (!approved ? ' &nbsp;|&nbsp; <span class="flagged">Audit flag recorded</span>' : '') +
      '</div>' +
      clueBox +
      '<div style="text-align: right;">' +
        '<button class="btn btn-small" id="btn-next-memory">' +
          nextLabel +
          ' <i class="fas fa-arrow-right" style="margin-left: 6px;"></i>' +
        '</button>' +
      '</div>' +
    '</div>';

  overlay.classList.add('active');

  document.getElementById('btn-next-memory').addEventListener('click', function() {
    overlay.classList.remove('active');
    state.currentMemory++;

    if (state.currentMemory >= MEMORIES.length) {
      state.screen = 'review';
    }

    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
}

function goToAssessment() {
  var auditPenalty = Math.max(0, state.auditFlags * 5);
  state.netScore = Math.max(0, state.totalDeductions - auditPenalty);
  var idx = getBracketIndex(state.netScore);
  state.finalBracket = BRACKETS[idx];
  state.screen = 'assessment';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ===================================================
   INIT
   =================================================== */

render();
</script>
